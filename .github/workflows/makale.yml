name: Ultra Blogger RSS Sistemi

on:
  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"   # Her gün 06:00 (Türkiye saati)

permissions:
  contents: write

concurrency:
  group: ultra-blogger-rss
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 20

    env:
      TZ: Europe/Istanbul

    steps:
      # ----------------------------------------------------
      # Depoyu indir
      # ----------------------------------------------------
      - name: Depoyu indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # ----------------------------------------------------
      # Node.js 22 kur
      # NOT: cache:"npm" kasıtlı olarak KULLANILMIYOR çünkü repoda
      # package-lock.json yok; cache seçeneği lock dosyası olmadan
      # "Dependencies lock file is not found" hatasıyla workflow'u
      # doğrudan başarısız eder.
      # ----------------------------------------------------
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ----------------------------------------------------
      # Bağımlılıkları kur (fast-xml-parser vb.)
      # ----------------------------------------------------
      - name: Bağımlılıkları kur
        run: npm install

      # ----------------------------------------------------
      # Sistem bilgileri
      # ----------------------------------------------------
      - name: Sistem bilgileri
        run: |
          echo "📦 Node sürümü:"
          node -v

          echo "📦 npm sürümü:"
          npm -v

          echo "📅 Sunucu saati:"
          date

      # ----------------------------------------------------
      # Makaleleri üret (XML doğrulaması script içinde yapılır)
      # ----------------------------------------------------
      - name: Makaleleri üret
        run: |
          set -e
          node src/makale.mjs

      # ----------------------------------------------------
      # XML dosyasını doğrula (dosya varlığı + boyutu)
      # ----------------------------------------------------
      - name: XML doğrulama
        run: |
          echo "📁 Klasör içeriği:"
          ls -la

          if [ ! -f "makaleler.xml" ]; then
            echo "❌ makaleler.xml bulunamadı!"
            exit 1
          fi

          echo "✅ makaleler.xml bulundu"

          echo "📦 Dosya boyutu:"
          wc -c makaleler.xml

          echo "🔍 İlk 10 satır:"
          head -n 10 makaleler.xml

      # ----------------------------------------------------
      # Git ayarları
      # ----------------------------------------------------
      - name: Git ayarları
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ----------------------------------------------------
      # Değişiklik kontrolü
      # ----------------------------------------------------
      - name: Değişiklik kontrolü
        id: changes
        shell: bash
        run: |
          git add makaleler.xml

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Değişiklik yok."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Değişiklik bulundu."
          fi

      # ----------------------------------------------------
      # Commit oluştur
      # ----------------------------------------------------
      - name: Commit oluştur
        if: steps.changes.outputs.changed == 'true'
        run: |
          git commit -m "📰 Günlük otomatik Blogger RSS güncellemesi"

      # ----------------------------------------------------
      # Uzak branch'i güncelle
      # ----------------------------------------------------
      - name: Uzak branch'i güncelle
        if: steps.changes.outputs.changed == 'true'
        run: |
          git pull --rebase origin main || git pull --rebase origin master || true

      # ----------------------------------------------------
      # GitHub'a gönder
      # ----------------------------------------------------
      - name: GitHub'a gönder
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin HEAD

      # ----------------------------------------------------
      # Son durum raporu
      # ----------------------------------------------------
      - name: Son durum raporu
        run: |
          echo "===================================="
          echo "🚀 ULTRA BLOGGER RSS SİSTEMİ"
          echo "===================================="
          echo "✅ Workflow başarıyla tamamlandı"
          echo "📰 Makaleler üretildi"
          echo "📄 XML dosyası script içinde gerçek şema doğrulamasından geçti"
          echo "📤 GitHub'a gönderildi"
          echo "🌐 RSS hazır"
          echo "📅 Tarih: $(date)"
          echo "===================================="
          echo "RSS URL:"
          echo "https://gizlivadinet-creator.github.io/makale/makaleler.xml"
          echo "===================================="
